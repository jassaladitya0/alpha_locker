{% extends 'layout.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-panel">
        <div class="auth-header text-center">
            <h2>Verify Your Email</h2>
            <p>We've sent a real OTP 6-digit code to <strong>{{ email }}</strong>.</p>
        </div>

        <form method="POST" action="{{ url_for('verify') }}" class="auth-form">
            <input type="hidden" name="email" value="{{ email }}">
            
            <div class="form-group">
                <label for="code">Verification Code</label>
                <div class="input-container">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="text" id="code" name="code" placeholder="Enter 6-digit code" required autocomplete="off" maxlength="6">
                </div>
            </div>
            
            <button type="submit" class="submit-btn btn-primary">Verify Code</button>
        </form>
        
        <form method="POST" action="{{ url_for('resend') }}" class="text-center" style="margin-top: 1.5rem;">
            <input type="hidden" name="email" value="{{ email }}">
            <p style="margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Didn't receive the code?</p>
            <button type="submit" class="btn-outline-sm">Resend Code</button>
        </form>
    </div>
</div>
{% endblock %}
